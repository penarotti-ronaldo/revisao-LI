<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado - Legislação Institucional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>📝 SIMULADO - LEGISLAÇÃO INSTITUCIONAL</h1>
        <p class="subtitle"><strong>Questões de Estudo</strong></p>
        <p class="subtitle">30 questões de múltipla escolha - Clique na alternativa para responder</p>

        <div id="questoes-container"></div>

        <div class="resultado" id="resultado">
            <span>✅ <span class="acertos" id="acertos">0</span> ACERTOS</span>
            <span>❌ <span class="erros" id="erros">0</span> ERROS</span>
            <span>📊 <span class="total" id="total">0</span> RESPONDIDAS</span>
        </div>

        <div class="text-center">
            <button class="btn-reiniciar" onclick="reiniciar()">🔄 REINICIAR SIMULADO</button>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
